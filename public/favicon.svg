<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#f5f0e8"/>
  <g transform="translate(256,256)">
    <!-- Drill bit body — inverted triangle -->
    <polygon points="0,170 -70,-100 70,-100" fill="#4a7fb5"/>
    <!-- Spiral flutes -->
    <line x1="-45" y1="-50" x2="45" y2="-30" stroke="#f5f0e8" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <line x1="-35" y1="0" x2="35" y2="20" stroke="#f5f0e8" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
    <line x1="-22" y1="50" x2="22" y2="65" stroke="#f5f0e8" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="-10" y1="100" x2="10" y2="108" stroke="#f5f0e8" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
    <!-- Chuck / top grip -->
    <rect x="-80" y="-140" width="160" height="45" rx="6" fill="#2c5a8a"/>
    <line x1="-60" y1="-118" x2="60" y2="-118" stroke="#f5f0e8" stroke-width="3" opacity="0.3"/>
  </g>
</svg>
